name: testing

on:
  push:
    branches: ["main", "dev"]
  pull_request:
      branches: ["main", "dev"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Dependencies
        run: go mod tidy
      - name: Run Tests
        run: go test ./...
